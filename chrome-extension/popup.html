<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d1a; color: #f0f0ff; padding: 16px; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 13px; font-weight: 600; }
  .card { background: #14142a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .card-title { font-size: 10px; color: #8888aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
  .badge-sync { background: rgba(124,92,255,0.15); color: #9b80ff; }
  .badge-off { background: rgba(85,85,119,0.2); color: #555577; }
  .pct { font-size: 28px; font-weight: 700; font-family: 'SF Mono', 'Cascadia Code', monospace; }
  .pct-ok { color: #10b981; }
  .pct-warn { color: #f59e0b; }
  .pct-danger { color: #ef4444; }
  .bar-bg { height: 6px; background: #1e1e3a; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .bar-ok { background: linear-gradient(90deg, #7c5cff, #3b82f6); }
  .bar-warn { background: linear-gradient(90deg, #f59e0b, #f97316); }
  .bar-danger { background: linear-gradient(90deg, #ef4444, #dc2626); }
  .meta { font-size: 11px; color: #8888aa; margin-top: 6px; display: flex; justify-content: space-between; }
  .footer { font-size: 10px; color: #555577; text-align: center; margin-top: 6px; }
  .error { color: #ef4444; font-size: 11px; text-align: center; padding: 20px 0; }
  .loading { color: #555577; font-size: 11px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c5cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <h1>Claude Usage</h1>
  </div>
  <div id="content"><div class="loading">Loading...</div></div>
  <script src="popup.js"></script>
</body>
</html>
